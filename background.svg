<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="none">

<style>
/* Slow drifting animation */
@keyframes drift {
    from { transform: translateX(0px); }
    to { transform: translateX(-120px); }
}

.line {
    fill: none;
    stroke: rgba(255,255,255,0.10);
    stroke-width: 1.2;
    animation: drift 60s linear infinite;
}

/* Slight variation layers */
.layer2 {
    stroke: rgba(255,255,255,0.07);
    animation-duration: 90s;
}

.layer3 {
    stroke: rgba(255,255,255,0.05);
    animation-duration: 120s;
}
</style>

<!-- BACK LAYER -->
<g class="line layer3">
    <path d="M0,200 C150,180 250,220 400,200 C550,180 650,220 800,200 C950,180 1050,220 1200,200" />
    <path d="M0,260 C150,240 250,280 400,260 C550,240 650,280 800,260 C950,240 1050,280 1200,260" />
    <path d="M0,320 C150,300 250,340 400,320 C550,300 650,340 800,320 C950,300 1050,340 1200,320" />
    <path d="M0,380 C150,360 250,400 400,380 C550,360 650,400 800,380 C950,360 1050,400 1200,380" />
</g>

<!-- MID LAYER -->
<g class="line layer2">
    <path d="M0,120 C180,100 300,140 450,120 C600,100 720,140 900,120 C1050,100 1150,140 1200,120" />
    <path d="M0,500 C180,480 300,520 450,500 C600,480 720,520 900,500 C1050,480 1150,520 1200,500" />
    <path d="M0,560 C180,540 300,580 450,560 C600,540 720,580 900,560 C1050,540 1150,580 1200,560" />
</g>

<!-- FRONT LAYER -->
<g class="line">
    <path d="M0,80 C200,60 300,100 500,80 C700,60 800,100 1000,80 C1100,60 1150,100 1200,80" />
    <path d="M0,650 C200,630 300,670 500,650 C700,630 800,670 1000,650 C1100,630 1150,670 1200,650" />
    <path d="M0,720 C200,700 300,740 500,720 C700,700 800,740 1000,720 C1100,700 1150,740 1200,720" />
</g>

</svg>
