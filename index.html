<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My ID</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="My ID">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#0b3d2e">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 18px;
    background: linear-gradient(rgba(0, 60, 40, 0.85), rgba(0, 25, 18, 0.92));
}

/* MAIN WRAPPER */
.container {
    width: 92vw;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* BOX STYLE */
.box {
    background: rgba(255, 255, 255, 0.92);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* TOP BOX */
.top {
    background: #0f5a3c;
    color: white;
    text-align: center;
    padding: 14px;
}

.top h1 {
    font-size: 18px;
}

.top h3 {
    font-size: 13px;
    font-weight: normal;
    opacity: 0.85;
    margin-top: 4px;
}

/* PHOTO BOX (separate, no overlap) */
.photo-box {
    display: flex;
    justify-content: center;
    padding: 18px;
}

.photo {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: #dcdcdc;
    background-size: cover;
    background-position: center;
    border: 5px solid white;
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
}

/* INFO BOX */
.info .field {
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.08);
}

.label {
    font-size: 12px;
    color: #666;
}

.value {
    font-size: 15px;
    font-weight: 600;
    color: #111;
    margin-top: 3px;
}

/* VALIDITY BOX */
.validity {
    background: #0f5a3c;
    color: white;
    text-align: center;
}

.validity .small {
    font-size: 12px;
    opacity: 0.85;
}

.validity .big {
    font-size: 16px;
    font-weight: bold;
    margin-top: 4px;
}
</style>
</head>

<body>

<div class="container">

    <!-- BOX 1: TITLE -->
    <div class="box top">
        <h1>University of Example</h1>
        <h3>Computer Science / Engineering</h3>
    </div>

    <!-- PHOTO (separate box, larger, no overlap) -->
    <div class="box photo-box">
        <div class="photo" style="background-image:url('your-photo.jpg')"></div>
    </div>

    <!-- BOX 2: PERSONAL INFO -->
    <div class="box info">

        <div class="field">
            <div class="label">Name</div>
            <div class="value">Your Name</div>
        </div>

        <div class="field">
            <div class="label">Date of Birth</div>
            <div class="value">01.01.2000</div>
        </div>

        <div class="field">
            <div class="label">Student Number</div>
            <div class="value">123456</div>
        </div>

    </div>

    <!-- BOX 3: VALIDITY -->
    <div class="box validity">
        <div class="small">VALID ID • Autumn 2026</div>
        <div class="big">Expires: 31.12.26</div>
    </div>

</div>

</body>
</html>
