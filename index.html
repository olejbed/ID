<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My ID</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 280px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #ddd;
      margin: auto;
    }

    h2 {
      margin: 10px 0 5px;
    }

    .id {
      color: gray;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="photo"></div>
    <h2>Your Name</h2>
    <div class="id">ID: 123456</div>
    <p>Student / Member</p>
  </div>
</body>
</html>
