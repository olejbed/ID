<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My ID</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="My ID">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Theme -->
    <meta name="theme-color" content="#0b3d2e">

    <!-- App Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;

            /* dark green translucent background */
            background: linear-gradient(
                rgba(0, 60, 40, 0.85),
                rgba(0, 30, 20, 0.9)
            );
        }

        .card {
            width: 340px;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
        }

        /* TOP TITLE AREA */
        .top {
            background: #0f5a3c;
            color: white;
            text-align: center;
            padding: 14px 10px;
        }

        .top h1 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .top h3 {
            font-size: 13px;
            font-weight: normal;
            opacity: 0.9;
        }

        /* PHOTO */
        .photo-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -35px;
        }

        .photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            background: #dcdcdc;
            background-size: cover;
            background-position: center;
        }

        /* NAME SECTION */
        .section-name {
            text-align: center;
            padding: 12px 20px;
            background: #e8f3ee;
        }

        .section-name h2 {
            font-size: 22px;
            color: #123;
            margin-bottom: 6px;
        }

        .section-name p {
            font-size: 14px;
            color: #2d4a3f;
        }

        /* INFO SECTION */
        .info {
            display: flex;
            flex-direction: column;
        }

        .field {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .field:nth-child(odd) {
            background: #f6fbf8;
        }

        .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .value {
            font-size: 15px;
            color: #111;
            font-weight: 500;
        }

        /* VALIDITY BOX */
        .validity {
            background: #0f5a3c;
            color: white;
            text-align: center;
            padding: 14px;
        }

        .validity .small {
            font-size: 12px;
            opacity: 0.85;
        }

        .validity .big {
            font-size: 16px;
            font-weight: bold;
            margin-top: 4px;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- TOP -->
    <div class="top">
        <h1>University of Example</h1>
        <h3>Computer Science / Engineering</h3>
    </div>

    <!-- PHOTO -->
    <div class="photo-wrapper">
        <div class="photo" style="background-image:url('your-photo.jpg')"></div>
    </div>

    <!-- NAME -->
    <div class="section-name">
        <h2>Your Name</h2>
        <p>Student ID Card</p>
    </div>

    <!-- INFO -->
    <div class="info">

        <div class="field">
            <div class="label">Date of Birth</div>
            <div class="value">01.01.2000</div>
        </div>

        <div class="field">
            <div class="label">Student Number</div>
            <div class="value">123456</div>
        </div>

    </div>

    <!-- VALIDITY -->
    <div class="validity">
        <div class="small">VALID ID • Autumn 2026</div>
        <div class="big">Expires: 31.12.26</div>
    </div>

</div>

</body>
</html>
