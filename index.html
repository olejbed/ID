<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My ID</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="My ID">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Theme -->
    <meta name="theme-color" content="#0d47a1">

    <!-- App Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, Helvetica, sans-serif;

            background:#f2f2f2;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:20px;

        }

        .card{

            width:300px;

            background:white;

            border-radius:20px;

            padding:25px;

            text-align:center;

            box-shadow:0 10px 30px rgba(0,0,0,.18);

        }

        .photo{

            width:110px;

            height:110px;

            border-radius:50%;

            background:#dcdcdc;

            margin:0 auto 18px;

        }

        h2{

            font-size:26px;

            margin-bottom:8px;

        }

        .id{

            color:#666;

            font-size:18px;

            margin-bottom:15px;

        }

        p{

            color:#444;

            font-size:17px;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="photo"></div>

    <h2>Your Name</h2>

    <div class="id">
        ID: 123456
    </div>

    <p>
        Student / Member
    </p>

</div>

</body>

</html>
