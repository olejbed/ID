<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My ID</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="My ID">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#0b3d2e">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌄 Animated SVG Background -->
<object class="background" type="image/svg+xml" data="background.svg"></object>

<!-- 🪪 ID CONTENT -->
<div class="container">

    <!-- BOX 1: INSTITUTION -->
    <div class="box top">
        <h1>University of Kinshasa (UNIKIN)</h1>
        <h3>Bachelors of Medicine</h3>
    </div>

    <!-- PHOTO -->
    <div class="photo-wrapper">
        <img class="photo" src="id.jpg" alt="ID Photo">
    </div>

    <!-- BOX 2: PERSONAL INFO -->
    <div class="box info">

        <div class="field">
            <div class="label">Name</div>
            <div class="value">Ole Jacob Bedringsås</div>
        </div>

        <div class="field">
            <div class="label">Date of Birth</div>
            <div class="value">10.05.1997</div>
        </div>

        <div class="field">
            <div class="label">Student Number</div>
            <div class="value">346436</div>
        </div>

    </div>

    <!-- BOX 3: VALIDITY -->
    <div class="box validity">
        <div class="small">VALID ID • Autumn 2026</div>
        <div class="big">Expires: 31.12.26</div>
    </div>

</div>

<!-- ⚙️ JS (IMPORTANT) -->
<script src="script.js"></script>

</body>
</html>
